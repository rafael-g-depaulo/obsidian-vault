<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020.6985162495318 467.4928999733713" width="1020.6985162495318" height="467.4928999733713" class="excalidraw-svg"><!-- svg-source:excalidraw --><metadata></metadata><defs><style class="style-fonts">
      @font-face { font-family: Virgil; src: url(data:font/woff2;base64,); }</style></defs><rect x="0" y="0" width="1020.6985162495318" height="467.4928999733713" fill="#ffffff"></rect><g transform="translate(10 10) rotate(0 111.80986785888672 12.5)"><text x="0" y="17.619999999999997" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Criação de personagem</text></g><g transform="translate(84.55947816359435 57.49289997337132) rotate(0 463.06951904296875 200)"><text x="0" y="17.619999999999997" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">1. Conceito</text><text x="0" y="42.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">    - Tem que se envolver no combate de alguma forma (curar aliados, bater,</text><text x="0" y="67.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">           usar magia, jogar maldições, tacar pedras, etc.)</text><text x="0" y="92.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">    - Backstory legal mas opcional</text><text x="0" y="117.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">    - Pode ser super detalhado ou vago (ou não ter ideia e só ouvir o jesus vomitar ideias)</text><text x="0" y="142.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="167.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">    OBS: Perguntas boas para o conceito</text><text x="0" y="192.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">      - Eu quero bater nas pessoas? (com armas ou não)</text><text x="0" y="217.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">      - Usa magia?</text><text x="0" y="242.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">      - Cura aliados e/ou a si mesmo?</text><text x="0" y="267.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="292.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">2. Existe uma classe que encaixa no conceito?</text><text x="0" y="317.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">    2.1. Sim: Bora montar a ficha</text><text x="0" y="342.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">    2.2. Não: Jesus monta o design de uma classe nova pra encaixar no conceito (iterativo)</text><text x="0" y="367.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="392.62" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="20px" fill="#000000" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">3. Montar a Ficha com a classe escolhida</text></g></svg>